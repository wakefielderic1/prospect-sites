<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Street Garage | Expert Auto Repair in Frisco, TX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            line-height: 1.6;
        }
        
        a {
            text-decoration: none;
            color: inherit;
        }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff3b30;
        }
        
        .logo span {
            color: #ffffff;
        }
        
        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        
        .nav-links a {
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: #ff3b30;
        }
        
        .nav-btn {
            background: #ff3b30;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .nav-btn:hover {
            background: #e6352b;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 80px;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1632823471565-1ecdf5c6da3e?w=1400&q=80') center/cover no-repeat;
            filter: brightness(0.3);
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(13, 13, 13, 0.9) 0%, rgba(13, 13, 13, 0.6) 50%, rgba(255, 59, 48, 0.2) 100%);
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 900px;
        }
        
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        
        .hero-badge i {
            color: #ff3b30;
        }
        
        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }
        
        .hero h1 span {
            color: #ff3b30;
        }
        
        .hero-tagline {
            font-size: 1.35rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .hero-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: #ff3b30;
            color: #fff;
            padding: 1.25rem 3rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .hero-btn:hover {
            background: #e6352b;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 59, 48, 0.4);
        }
        
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-top: 4rem;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        .stat-box .number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff3b30;
        }
        
        .stat-box .label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.25rem;
        }
        
        /* Trust Bar */
        .trust-bar {
            background: linear-gradient(90deg, #ff3b30 0%, #d62d23 100%);
            padding: 1.25rem 5%;
            overflow: hidden;
        }
        
        .trust-items {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        
        .trust-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        
        .trust-item i {
            font-size: 1.1rem;
        }
        
        /* Services Section */
        .services {
            padding: 100px 5%;
        }
        
        .section-header {
            text-align: center;
            max-width: 700px;
            margin: 0 auto 4rem;
        }
        
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #ff3b30;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .section-header h2 {
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }
        
        .section-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .service-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
        }
        
        .service-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 59, 48, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .service-img {
            position: relative;
            height: 200px;
            overflow: hidden;
        }
        
        .service-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        
        .service-card:hover .service-img img {
            transform: scale(1.1);
        }
        
        .service-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff3b30;
            color: #fff;
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .service-content {
            padding: 1.75rem;
        }
        
        .service-content h3 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }
        
        .service-content p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            line-height: 1.7;
        }
        
        /* About Section */
        .about {
            padding: 100px 5%;
            background: linear-gradient(180deg, rgba(255, 59, 48, 0.05) 0%, transparent 100%);
        }
        
        .about-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            max-width: 1400px;
            margin: 0 auto;
            align-items: center;
        }
        
        .about-image {
            position: relative;
        }
        
        .about-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }
        
        .about-image-badge {
            position: absolute;
            bottom: -30px;
            right: -30px;
            background: #ff3b30;
            color: #fff;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            text-align: center;
        }
        
        .about-image-badge .years {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .about-image-badge span {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .about-content .section-label {
            justify-content: flex-start;
        }
        
        .about-content h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }
        
        .about-content > p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        
        .about-points {
            list-style: none;
            display: grid;
            gap: 1rem;
        }
        
        .about-points li {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.05rem;
        }
        
        .about-points li i {
            width: 28px;
            height: 28px;
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
        
        /* Gallery Section */
        .gallery {
            padding: 100px 5%;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(255, 59, 48, 0.8) 100%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }
        
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        
        .gallery-overlay i {
            font-size: 1.5rem;
        }
        
        /* Reviews Section */
        .reviews {
            padding: 100px 5%;
            background: linear-gradient(180deg, transparent 0%, rgba(255, 59, 48, 0.05) 100%);
        }
        
        .reviews-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .reviews-summary {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
