<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trans Auto Body | Premier Auto Repair in Arlington, TX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            line-height: 1.6;
        }
        
        a {
            text-decoration: none;
            color: inherit;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 59, 48, 0.3);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff3b30;
        }
        
        .logo span {
            color: #ffffff;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .nav-links a {
            color: #ffffff;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: #ff3b30;
        }
        
        .cta-button {
            background: #ff3b30;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .cta-button:hover {
            background: #e6352b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 59, 48, 0.4);
        }
        
        .mobile-menu {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1632823471565-1ecdf5c6da3e?w=1400&q=80') center/cover no-repeat;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(13, 13, 13, 0.9) 0%, rgba(13, 13, 13, 0.7) 50%, rgba(255, 59, 48, 0.2) 100%);
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
            padding: 0 20px;
        }
        
        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .hero h1 span {
            color: #ff3b30;
        }
        
        .hero-tagline {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }
        
        .hero-phone {
            font-size: 2rem;
            font-weight: 700;
            color: #ff3b30;
            margin-bottom: 30px;
            display: block;
        }
        
        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #ff3b30;
            color: #ffffff;
            padding: 18px 40px;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .hero-cta:hover {
            background: #e6352b;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.5);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 60px;
        }
        
        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }
        
        .stat-box i {
            font-size: 2rem;
            color: #ff3b30;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }
        
        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        /* Trust Bar */
        .trust-bar {
            background: linear-gradient(90deg, #ff3b30, #cc2f26);
            padding: 20px 0;
        }
        
        .trust-items {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
        }
        
        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        
        .trust-item i {
            font-size: 1.2rem;
        }
        
        /* Services Section */
        .services {
            padding: 100px 0;
            background: #0d0d0d;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .section-subtitle {
            color: #ff3b30;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .section-desc {
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        .service-card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .service-card:hover {
            transform: translateY(-10px);
            border-color: #ff3b30;
            box-shadow: 0 20px 40px rgba(255, 59, 48, 0.2);
        }
        
        .service-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .service-content {
            padding: 25px;
        }
        
        .service-badge {
            display: inline-block;
            background: rgba(255, 59, 48, 0.2);
            color: #ff3b30;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .service-card h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .service-card p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }
        
        /* About Section */
        .about {
            padding: 100px 0;
            background: #111111;
        }
        
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }
        
        .about-image {
            position: relative;
        }
        
        .about-image img {
            width: 100%;
            border-radius: 15px;
        }
        
        .about-image::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: 20px;
            bottom: 20px;
            border: 3px solid #ff3b30;
            border-radius: 15px;
            z-index: -1;
        }
        
        .experience-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: #ff3b30;
            color: #ffffff;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .experience-badge .number {
            font-size: 2.5rem;
            font-weight: 800;
            display: block;
        }
        
        .experience-badge span {
            font-size: 0.9rem;
        }
        
        .about-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .about-content h2 span {
            color: #ff3b30;
        }
        
        .about-content > p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .about-features {
            list-style: none;
        }
        
        .about-features li {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .about-features i {
            color: #ff3b30;
            font-size: 1.2rem;
            margin-top: 3px;
        }
        
        .about-features strong {
            display: block;
            margin-bottom: 5px;
        }
        
        .about-features span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }
        
        /* Gallery Section */
        .gallery {
            padding: 80px 0;
            background: #0d0d0d;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            aspect-ratio: 1;
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 59, 48, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        
        .gallery-overlay i {
            font-size: 2rem;
            color: #ffffff;
        }
        
        /* Reviews Section */
        .reviews {
            padding: 100px 0;
            background: #111111;
        }
        
        .reviews-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }
        
        .reviews-score {
            background: linear-gradient(135deg, #1a1a1a, #222222);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }
        
        .score-number {
            font-size: 5rem;
            font-weight: 800;
            color: #ff3b30;
            line-height: 1;
        }
        
        .score-stars {
            color: #ff3b30;
            font-size: 1.5rem;
            margin: 15px 0;
        }
        
        .score-count {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        
        .star-bars {
            text-align: left;
        }
        
        .star-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .star-bar-fill {
            flex: 1;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .star-bar-fill span {
            display: block;
            height: 100%;
            background: #ff3b30;
            border-radius: 4px;
        }
        
        .reviews-grid {
            display: grid;
            gap: 20px;
        }
        
        .review-card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px
