<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar's Auto Repair | Arlington, TX | Expert Auto Service</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 13, 13, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff3b30;
        }

        .nav-logo span {
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            font-weight: 500;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: #ff3b30;
        }

        .nav-cta {
            background: #ff3b30;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-cta:hover {
            background: #e6352b;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
        }

        .mobile-menu {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1632823471565-1ecdf5c6da3e?w=1400&q=80') center/cover no-repeat;
            padding: 120px 5% 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(13, 13, 13, 0.9) 0%, rgba(13, 13, 13, 0.7) 50%, rgba(255, 59, 48, 0.2) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero h1 span {
            color: #ff3b30;
        }

        .hero-tagline {
            font-size: 1.35rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: #ff3b30;
            color: #ffffff;
            padding: 1.25rem 2.5rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s;
            margin-bottom: 3rem;
        }

        .hero-cta:hover {
            background: #e6352b;
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(255, 59, 48, 0.4);
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 16px;
            transition: all 0.3s;
        }

        .stat-box:hover {
            background: rgba(255, 59, 48, 0.1);
            border-color: rgba(255, 59, 48, 0.3);
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff3b30;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 0.5rem;
        }

        /* Trust Bar */
        .trust-bar {
            background: linear-gradient(90deg, #ff3b30, #ff6b5b);
            padding: 1.25rem 5%;
            overflow: hidden;
        }

        .trust-items {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .trust-item i {
            font-size: 1.1rem;
        }

        /* Section Styles */
        section {
            padding: 100px 5%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #ff3b30;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .section-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Services Section */
        .services {
            background: #0d0d0d;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .service-card {
            background: linear-gradient(145deg, #1a1a1a, #141414);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 59, 48, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .service-image {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .service-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .service-card:hover .service-image img {
            transform: scale(1.1);
        }

        .service-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff3b30;
            color: #ffffff;
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .service-content {
            padding: 1.75rem;
        }

        .service-content h3 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .service-content p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* About Section */
        .about {
            background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 100%);
        }

        .about-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .about-image-badge {
            position: absolute;
            bottom: -20px;
            right: -20px;
            background: #ff3b30;
            color: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            text-align: center;
        }

        .about-image-badge .number {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .about-image-badge .text {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .about-content h2 {
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
        }

        .about-content h2 span {
            color: #ff3b30;
        }

        .about-text {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .about-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .about-feature {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .about-feature i {
            color: #ff3b30;
            font-size: 1.25rem;
            margin-top: 0.2rem;
        }

        .about-feature span {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Gallery Section */
        .gallery {
            padding: 80px 0;
            background: #0d0d0d;
        }

        .gallery-header {
            padding: 0 5%;
            margin-bottom: 3rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            padding: 0 5%;
        }

        .gallery-item {
            position: relative;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(255, 59, 48, 0.8) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay span {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Reviews Section */
        .reviews {
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
        }

        .reviews-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 3rem;
        }

        .reviews-score {
            background: linear-gradient(145deg, #1f1f1f, #171717);
            border-radius: 24px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .score-number {
            font-size: 5rem;
            font-
